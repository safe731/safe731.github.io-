<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Generator</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Short Link Generator</h1>

<input id="url" type="url" placeholder="Destination URL">

<input id="filename" type="text" placeholder="File Name">

<input id="filesize" type="text" placeholder="File Size">

<input id="delay" type="number" value="10" placeholder="Wait Time">

<input id="customCode" type="text" placeholder="Custom Code (Optional)">

<button onclick="generateLink()">
Generate Link
</button>

<div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
